name: mendix-widget
version: 1
description: Spec-driven workflow for Mendix pluggable widget development

artifacts:
  - id: proposal
    generates: proposal.md
    description: Feature intent, Mendix XML impact, and scope
    template: proposal.md
    instruction: |
      Create a proposal for this widget change. Focus on:
      - WHY this change is needed (user problem or technical improvement)
      - WHAT Mendix XML properties are added, modified, or removed
      - SCOPE: what's in scope, what's explicitly out of scope
      - Whether a CHANGELOG.md entry and semver bump will be required
      Keep it concise. Avoid implementation details.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Behavior requirements and scenarios for the widget
    template: spec.md
    instruction: |
      Create delta specs describing the behavioral changes to this widget.
      Use ADDED/MODIFIED/REMOVED sections.
      Each requirement MUST have at least one Given/When/Then scenario.
      Cover: happy path, loading states, empty states, error states, accessibility.
      Do NOT reference component names, class names, or implementation details.
      Specs should be testable — a QA engineer should be able to verify them manually.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical implementation approach
    template: design.md
    instruction: |
      Create a technical design for this widget change. Include:
      - Which Mendix API values are involved (EditableValue, ActionValue, etc.)
      - Component hierarchy changes (new components, modified components)
      - SCSS changes (new classes, modified styles)
      - XML property changes (new properties, modified defaults)
      - MobX store changes (if applicable)
      - List of files to add/modify
      Keep implementation decisions justified and pragmatic.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist for this widget change
    template: tasks.md
    instruction: |
      Create an implementation checklist. Group tasks under these headings:
      1. XML & TypeScript types (XML changes, typings, editorConfig)
      2. Implementation (component changes, hooks, stores)
      3. Tests (unit tests, E2E tests)
      4. Versioning (CHANGELOG.md, semver bump) — only if runtime/XML/behavior changes
      Use hierarchical numbering (1.1, 1.2, 2.1, etc.).
      Each task should be completable in one focused coding session.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
